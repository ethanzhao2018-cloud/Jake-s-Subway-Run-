<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Subway Run</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:Arial,sans-serif; touch-action:none; }
canvas { display:block; }
#hud { position:absolute; top:0; left:0; width:100%; display:flex; justify-content:space-between; padding:12px 16px; pointer-events:none; z-index:5; }
.hb { background:rgba(0,0,0,0.65); border-radius:25px; padding:7px 16px; color:#fff; font-size:18px; font-weight:bold; }
#menu { position:absolute; top:0; left:0; width:100%; height:100%; background:linear-gradient(180deg,#1a0535 0%,#2d0a5e 50%,#0d2240 100%); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
#menu h1 { font-size:54px; font-weight:900; color:#fff; text-shadow:0 0 25px #ff6b00; letter-spacing:3px; margin-bottom:6px; }
#menu .sub { font-size:12px; letter-spacing:4px; color:#ff6b00; margin-bottom:22px; }
#menu .info { color:gold; font-size:14px; margin-bottom:18px; }
.card { background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.12); border-radius:14px; padding:14px; width:290px; margin-bottom:10px; }
.srow { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.07); }
.srow:last-child { border-bottom:none; }
.sn { color:#fff; font-size:13px; font-weight:bold; }
.sd { color:#777; font-size:10px; }
.sbuy { border:none; border-radius:8px; padding:7px 12px; font-size:11px; font-weight:bold; cursor:pointer; }
.sg { background:#f1c40f; color:#000; }
.so { background:#1a4a1a; color:#4ade80; }
.sl { background:#2a2a2a; color:#555; }
#runbtn { background:linear-gradient(135deg,#ff6b00,#e74c3c); color:#fff; border:none; padding:15px 80px; font-size:22px; font-weight:900; border-radius:50px; cursor:pointer; margin-top:14px; }
#over { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
#over h2 { font-size:50px; color:#e74c3c; text-shadow:0 0 18px #e74c3c; margin-bottom:10px; }
.or { color:#aaa; font-size:15px; margin:4px 0; }
.or b { color:#fff; }
#retrybtn { background:linear-gradient(135deg,#27ae60,#2ecc71); color:#fff; border:none; padding:14px 60px; font-size:19px; font-weight:900; border-radius:50px; cursor:pointer; margin-top:20px; margin-bottom:10px; }
#menubtn { background:none; border:2px solid #555; color:#999; padding:9px 38px; font-size:13px; border-radius:50px; cursor:pointer; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div class="hb">COINS: <span id="hcoins">0</span></div>
  <div class="hb">SCORE: <span id="hscore">0</span></div>
</div>

<div id="menu">
  <h1>SUBWAY RUN</h1>
  <div class="sub">JAKE'S ESCAPE</div>
  <div class="info">BANK: <span id="mbank">0</span> &nbsp;|&nbsp; BEST: <span id="mbest">0</span></div>
  <div class="card" id="shopcard"></div>
  <div class="card">
    <div class="srow">
      <div><div class="sn">Difficulty</div></div>
      <div style="display:flex;gap:6px">
        <button id="dEasy" onclick="setDiff('easy')" style="background:#3a1500;color:#fff;border:2px solid #ff6b00;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:bold;cursor:pointer">EASY</button>
        <button id="dHard" onclick="setDiff('hard')" style="background:#222;color:#888;border:2px solid #333;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:bold;cursor:pointer">HARD</button>
        <button id="dGod"  onclick="setDiff('god')"  style="background:#222;color:#888;border:2px solid #333;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:bold;cursor:pointer">GOD</button>
      </div>
    </div>
    <div class="srow">
      <div><div class="sn">Hoodie Color</div></div>
      <input type="color" id="hoodpick" value="#ff4400" style="width:44px;height:30px;border:none;cursor:pointer;border-radius:6px">
    </div>
  </div>
  <button id="runbtn" onclick="startGame()">RUN</button>
</div>

<div id="over">
  <h2>BUSTED!</h2>
  <div class="or">Score: <b id="oscore">0</b></div>
  <div class="or">Coins: <b id="ocoins">0</b></div>
  <div class="or" id="obest"></div>
  <button id="retrybtn" onclick="startGame()">RETRY</button>
  <button id="menubtn"  onclick="goMenu()">MENU</button>
</div>

<script>

// ---- canvas setup ----
var C = document.getElementById('c');
var X = C.getContext('2d');
C.width  = window.innerWidth;
C.height = window.innerHeight;
var W = C.width;
var H = C.height;

// ---- perspective ----
var VX = W / 2;
var VY = H * 0.28;
var GY = H * 0.86;
var LW = W * 0.17;

function proj(laneX, z, wy) {
  if (!wy) wy = 0;
  var t = z < 0.001 ? 0.001 : z;
  return {
    x: VX + laneX * LW * t,
    y: VY + (GY - VY) * t - wy * t * 110,
    s: t
  };
}

// ---- save data ----
var SAVE_KEY = 'srV7';
var sv = loadSave();

function loadSave() {
  try {
    var d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d && typeof d === 'object') return d;
  } catch(e) {}
  return { bank:0, best:0, dj:false, mag:false, sh:false, jet:false, x2:false, color:'#ff4400', diff:'easy' };
}

function saveSave() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(sv)); } catch(e) {}
}

// ---- shop items ----
var SHOP = [
  { id:'dj',  label:'Double Jump',  desc:'Jump again in air',      cost:50  },
  { id:'mag', label:'Coin Magnet',  desc:'Auto-collect coins',     cost:150 },
  { id:'sh',  label:'Start Shield', desc:'One free hit',           cost:200 },
  { id:'jet', label:'Jetpack Drop', desc:'Jetpack power-ups drop', cost:350 },
  { id:'x2',  label:'Score x2',     desc:'Double your score',      cost:600 }
];

// ---- difficulty ----
var DIFF = {
  easy: { spd:0.010, acc:0.0000016, gap:2.0 },
  hard: { spd:0.016, acc:0.0000030, gap:1.4 },
  god:  { spd:0.025, acc:0.0000055, gap:1.0 }
};

function setDiff(d) {
  sv.diff = d;
  saveSave();
  document.getElementById('dEasy').style.background = d==='easy' ? '#3a1500' : '#222';
  document.getElementById('dEasy').style.color      = d==='easy' ? '#fff'    : '#888';
  document.getElementById('dEasy').style.borderColor= d==='easy' ? '#ff6b00' : '#333';
  document.getElementById('dHard').style.background = d==='hard' ? '#3a1500' : '#222';
  document.getElementById('dHard').style.color      = d==='hard' ? '#fff'    : '#888';
  document.getElementById('dHard').style.borderColor= d==='hard' ? '#ff6b00' : '#333';
  document.getElementById('dGod').style.background  = d==='god'  ? '#3a1500' : '#222';
  document.getElementById('dGod').style.color       = d==='god'  ? '#fff'    : '#888';
  document.getElementById('dGod').style.borderColor = d==='god'  ? '#ff6b00' : '#333';
}

function buyItem(id, cost) {
  if (sv[id]) return;
  if (sv.bank < cost) return;
  sv.bank -= cost;
  sv[id] = true;
  saveSave();
  renderMenu();
}

function renderMenu() {
  document.getElementById('mbank').textContent = sv.bank;
  document.getElementById('mbest').textContent = sv.best;
  document.getElementById('hoodpick').value = sv.color;
  setDiff(sv.diff);

  var html = '';
  for (var i = 0; i < SHOP.length; i++) {
    var it = SHOP[i];
    var owned = sv[it.id];
    var canBuy = !owned && sv.bank >= it.cost;
    var cls = owned ? 'so' : canBuy ? 'sg' : 'sl';
    var txt = owned ? 'OWNED' : it.cost + ' coins';
    html += '<div class="srow">';
    html += '<div><div class="sn">' + it.label + '</div><div class="sd">' + it.desc + '</div></div>';
    html += '<button class="sbuy ' + cls + '" onclick="buyItem(\'' + it.id + '\',' + it.cost + ')">' + txt + '</button>';
    html += '</div>';
  }
  document.getElementById('shopcard').innerHTML = html;
}

document.getElementById('hoodpick').addEventListener('change', function() {
  sv.color = this.value;
  saveSave();
});

// ---- game state ----
var G = {};
var running = false;

function initG() {
  var d = DIFF[sv.diff];
  G = {
    t: 0,
    spd: d.spd,
    acc: d.acc,
    gap: d.gap,
    score: 0,
    coins: 0,
    lane: 0,
    laneF: 0,
    py: 0,
    pvy: 0,
    pduck: false,
    pjumps: 0,
    pjet: false,
    pjetT: 0,
    shield: sv.sh,
    shflash: 0,
    objs: [],
    parts: [],
    nextObs: d.gap,
    power: null,
    powerT: 0,
    mult: sv.x2 ? 2 : 1,
    shake: 0,
    runT: 0,
    seed: Math.floor(Math.random() * 9999)
  };
}

// ---- spawn ----
var OBS = ['train','train','barrier','pipe','cop','cop'];
var PWS = ['magnet','shield','jetpack'];

function spawnWave() {
  var ls = [-1, 0, 1];

  // coins
  if (Math.random() < 0.65) {
    var cl = ls[Math.floor(Math.random() * 3)];
    var hi = Math.random() < 0.3;
    var cn = 4 + Math.floor(Math.random() * 5);
    for (var i = 0; i < cn; i++) {
      G.objs.push({ type:'coin', lane:cl, z:0, dz:-0.04 - i*0.018, wy: hi ? 0.7 : 0, w:0.18, h:0.18 });
    }
  }

  // obstacle
  var ot = OBS[Math.floor(Math.random() * OBS.length)];
  var ol = ls[Math.floor(Math.random() * 3)];

  if (ot === 'train') {
    var shuffled = ls.slice().sort(function() { return Math.random() - 0.5; });
    var bl = 1 + Math.floor(Math.random() * 2);
    for (var i = 0; i < bl; i++) {
      G.objs.push({ type:'train', lane:shuffled[i], z:0, dz:-0.013, wy:0, w:0.9, h:1.2, col: Math.random()<0.5 ? '#e74c3c' : '#2980b9' });
    }
  } else if (ot === 'pipe') {
    G.objs.push({ type:'pipe', lane:ol, z:0, dz:-0.013, wy:0.44, w:1.1, h:0.32 });
  } else if (ot === 'barrier') {
    G.objs.push({ type:'barrier', lane:ol, z:0, dz:-0.013, wy:0, w:0.36, h:1.1 });
  } else if (ot === 'cop') {
    G.objs.push({ type:'cop', lane:ol, z:0, dz:-0.013, wy:0, w:0.55, h:1.2, shotZ:0.55, shot:false });
  }

  // powerup
  if ((sv.jet && Math.random() < 0.15) || Math.random() < 0.07) {
    var pt = PWS[Math.floor(Math.random() * PWS.length)];
    G.objs.push({ type:pt, lane:ls[Math.floor(Math.random()*3)], z:0, dz:-0.014, wy:0.6, w:0.3, h:0.3 });
  }
}

// ---- physics ----
var GRAV = 0.026;
var JVEL = 0.36;

function doPhysics() {
  G.laneF += (G.lane - G.laneF) * 0.2;
  if (G.pjet) {
    G.pjetT--;
    G.pvy = -0.05;
    if (G.pjetT <= 0) G.pjet = false;
  } else {
    G.pvy -= GRAV;
  }
  G.py += G.pvy;
  if (G.py <= 0) { G.py = 0; G.pvy = 0; G.pjumps = 0; G.pduck = false; }
  G.runT += G.spd * 40;
}

// ---- collision ----
function doCollision() {
  var pH = G.pduck ? 0.42 : 1.0;
  var keep = [];
  for (var i = 0; i < G.objs.length; i++) {
    var o = G.objs[i];
    if (o.z < -0.2) continue;

    o.z += o.dz * (G.spd / 0.013);

    // cop shoots
    if (o.type === 'cop' && !o.shot && o.z > o.shotZ) {
      o.shot = true;
      G.objs.push({ type:'bullet', lane:o.lane, z:o.z, dz:-0.06, wy:0.3, w:0.12, h:0.07 });
    }

    // magnet
    if ((sv.mag || G.power === 'magnet') && o.type === 'coin') {
      if (Math.abs(o.lane - G.laneF) < 0.9 && o.z > 0.55) {
        o.lane += (G.laneF - o.lane) * 0.12;
        o.wy   += (G.py + 0.1 - o.wy) * 0.1;
      }
    }

    // hit zone
    var hit = false;
    if (o.z >= 0.68 && o.z <= 1.12) {
      if (Math.abs(o.lane - G.laneF) <= 0.65) {
        var oTop = o.wy + o.h;
        if (!(G.py > oTop || G.py + pH < o.wy)) {
          hit = true;
        }
      }
    }

    if (hit) {
      if (o.type === 'coin') {
        G.coins++;
        burst(proj(o.lane, 0.88, o.wy), '#FFD700', 6);
        continue;
      }
      if (o.type === 'magnet' || o.type === 'shield' || o.type === 'jetpack') {
        activatePower(o.type);
        continue;
      }
      // obstacle
      if (G.pjet) { burst(proj(o.lane, 0.9, o.wy), '#ff8800', 8); continue; }
      if (G.shield || G.power === 'shield') {
        G.shield = false;
        G.power = null;
        G.shflash = 30;
        burst(proj(o.lane, 0.9, o.wy), '#00ff88', 10);
        continue;
      }
      G.shake = 18;
      running = false;
      keep.push(o);
      continue;
    }
    keep.push(o);
  }
  G.objs = keep;

  if (G.power) {
    G.powerT--;
    if (G.powerT <= 0) G.power = null;
  }
  if (G.shflash > 0) G.shflash--;
  if (G.shake > 0) G.shake *= 0.83;
}

function activatePower(t) {
  if (t === 'jetpack') { G.pjet = true; G.pjetT = 200; }
  else { G.power = t; G.powerT = 360; }
  burst(proj(G.laneF, 0.88, 0.6), '#ffaa00', 10);
}

// ---- particles ----
function burst(p, col, n) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2;
    var v = 1 + Math.random() * 4;
    G.parts.push({ x:p.x, y:p.y, vx:Math.cos(a)*v, vy:Math.sin(a)*v - 2, life:38, col:col });
  }
}

function tickParts() {
  var k = [];
  for (var i = 0; i < G.parts.length; i++) {
    var p = G.parts[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
    if (p.life > 0) k.push(p);
  }
  G.parts = k;
}

// ---- update ----
function update() {
  G.t++;
  G.spd = DIFF[sv.diff].spd + G.t * G.acc;
  G.score = Math.floor(G.t * G.spd * 55 * G.mult);

  document.getElementById('hscore').textContent = G.score;
  document.getElementById('hcoins').textContent = G.coins;

  G.nextObs -= G.spd;
  if (G.nextObs <= 0) {
    spawnWave();
    G.nextObs = G.gap + Math.random() * 0.5;
  }

  doPhysics();
  doCollision();
  tickParts();
}

// ---- draw helpers ----
function rrect(x, y, w, h, r) {
  r = r < w/2 ? r : w/2;
  r = r < h/2 ? r : h/2;
  X.beginPath();
  X.moveTo(x + r, y);
  X.lineTo(x + w - r, y);
  X.arcTo(x+w, y,   x+w, y+r,   r);
  X.lineTo(x+w, y+h-r);
  X.arcTo(x+w, y+h, x+w-r, y+h, r);
  X.lineTo(x+r,  y+h);
  X.arcTo(x,   y+h, x, y+h-r,   r);
  X.lineTo(x,   y+r);
  X.arcTo(x,   y,   x+r, y,     r);
  X.closePath();
}

// ---- draw sky ----
function drawSky() {
  var g = X.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#070318');
  g.addColorStop(0.5, '#140828');
  g.addColorStop(1, '#081520');
  X.fillStyle = g;
  X.fillRect(0, 0, W, H);

  for (var i = 0; i < 70; i++) {
    var sx = (i * 137 + G.t * 0.14) % W;
    var sy = (i * 89) % (VY * 0.95);
    X.fillStyle = i % 5 === 0 ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.25)';
    X.fillRect(sx, sy, i % 5 === 0 ? 2 : 1, i % 5 === 0 ? 2 : 1);
  }

  // moon
  X.beginPath();
  X.arc(W * 0.82, H * 0.08, 25, 0, Math.PI * 2);
  X.fillStyle = 'rgba(255,240,180,0.85)';
  X.fill();
  X.beginPath();
  X.arc(W * 0.82 + 9, H * 0.08 - 4, 19, 0, Math.PI * 2);
  X.fillStyle = '#0e0320';
  X.fill();
}

// ---- draw city ----
function drawCity() {
  // left wall
  var le = proj(-2, 0.001);
  var lb = proj(-2, 1.0);
  X.fillStyle = '#08081a';
  X.beginPath();
  X.moveTo(0, 0);
  X.lineTo(le.x, VY);
  X.lineTo(lb.x, GY);
  X.lineTo(0, H);
  X.closePath();
  X.fill();

  // right wall
  var re = proj(2, 0.001);
  var rb = proj(2, 1.0);
  X.fillStyle = '#08081a';
  X.beginPath();
  X.moveTo(W, 0);
  X.lineTo(re.x, VY);
  X.lineTo(rb.x, GY);
  X.lineTo(W, H);
  X.closePath();
  X.fill();

  // buildings
  var bx, bw, bh, by;
  var blds = [
    [0,    0.09, 0.48],
    [0.07, 0.10, 0.38],
    [0.17, 0.07, 0.32],
    [0.70, 0.11, 0.52],
    [0.80, 0.09, 0.40],
    [0.90, 0.09, 0.30]
  ];
  var seed = G.seed;
  for (var i = 0; i < blds.length; i++) {
    bx = blds[i][0] * W;
    bw = blds[i][1] * W;
    bh = blds[i][2] * (H - GY * 0.4);
    by = VY * 0.7 - bh;
    X.fillStyle = '#090920';
    X.fillRect(bx, by, bw, bh + VY * 0.3);
    for (var wy = by + 8; wy < by + bh - 10; wy += 15) {
      for (var wx = bx + 5; wx < bx + bw - 5; wx += 12) {
        if (Math.sin(wx * 7 + wy * 3 + seed) > 0.25) {
          X.fillStyle = 'rgba(255,215,90,0.28)';
          X.fillRect(wx, wy, 6, 8);
        }
      }
    }
  }

  // neon signs
  var signs = [
    [W*0.06, VY+25, 'SURF', '#ff6b00'],
    [W*0.87, VY+52, 'CITY', '#00f2ff'],
    [W*0.04, VY+80, 'RUN',  '#ff00ff'],
    [W*0.93, VY+92, 'SUB',  '#f1c40f']
  ];
  for (var i = 0; i < signs.length; i++) {
    var s = signs[i];
    X.save();
    X.font = 'bold 12px Arial';
    X.textAlign = 'center';
    X.shadowBlur = 10;
    X.shadowColor = s[3];
    X.fillStyle = s[3];
    X.globalAlpha = 0.6 + 0.35 * Math.sin(G.t * 0.05 + i);
    X.fillText(s[2], s[0], s[1]);
    X.shadowBlur = 0;
    X.globalAlpha = 1;
    X.restore();
  }
}

// ---- draw track ----
function drawTrack() {
  var g = X.createLinearGradient(0, VY, 0, H);
  g.addColorStop(0,    '#160e2a');
  g.addColorStop(0.3,  '#0e0c1e');
  g.addColorStop(1,    '#070710');
  X.fillStyle = g;
  var ll = proj(-3, 0.001);
  var lr = proj(3, 0.001);
  X.beginPath();
  X.moveTo(ll.x, VY);
  X.lineTo(lr.x, VY);
  X.lineTo(W, H);
  X.lineTo(0, H);
  X.closePath();
  X.fill();

  // rails
  var lanes = [-1, 0, 1];
  for (var li = 0; li < lanes.length; li++) {
    var lv = lanes[li];
    for (var r = -0.08; r <= 0.09; r += 0.16) {
      var z0 = proj(lv * 1.45 + r, 0.01);
      var z1 = proj(lv * 1.45 + r, 1.06);
      X.beginPath();
      X.moveTo(z0.x, z0.y);
      X.lineTo(z1.x, z1.y);
      X.strokeStyle = 'rgba(110,110,200,0.55)';
      X.lineWidth = 2;
      X.stroke();
    }
  }

  // sleepers
  var off = (G.t * G.spd) % 1;
  for (var i = 0; i < 20; i++) {
    var frac = (i / 20 + off) * 1.05;
    if (frac > 1.05) continue;
    var tl = proj(-1.65, frac);
    var tr = proj(1.65, frac);
    X.beginPath();
    X.moveTo(tl.x, tl.y);
    X.lineTo(tr.x, tr.y);
    X.strokeStyle = 'rgba(60,60,150,' + (0.12 + frac * 0.28) + ')';
    X.lineWidth = Math.max(1, frac * 4);
    X.stroke();
  }

  // horizon glow
  X.beginPath();
  X.moveTo(0, VY);
  X.lineTo(W, VY);
  X.strokeStyle = 'rgba(140,80,255,0.35)';
  X.lineWidth = 2;
  X.stroke();
}

// ---- draw objects ----
function drawObjs() {
  var sorted = G.objs.slice().sort(function(a, b) { return a.z - b.z; });

  for (var i = 0; i < sorted.length; i++) {
    var o = sorted[i];
    if (o.z < 0.02 || o.z > 1.15) continue;

    var p = proj(o.lane, o.z, o.wy);
    var sc = p.s;
    var sw = o.w * LW * sc * 1.4;
    var sh = o.h * LW * sc * 1.4;

    X.save();
    X.translate(p.x, p.y);

    if (o.type === 'coin') {
      var spin = Math.sin(G.t * 0.13 + o.lane * 1.6 + o.z * 7);
      X.save();
      X.scale(spin * sc, sc);
      X.beginPath();
      X.arc(0, 0, 11, 0, Math.PI * 2);
      X.fillStyle = '#FFD700';
      X.shadowBlur = 8;
      X.shadowColor = '#FFD700';
      X.fill();
      X.shadowBlur = 0;
      X.fillStyle = '#000';
      X.font = 'bold 10px Arial';
      X.textAlign = 'center';
      X.textBaseline = 'middle';
      X.fillText('$', 0, 0);
      X.restore();

    } else if (o.type === 'train') {
      var tw = sw * 1.1, th = sh;
      X.fillStyle = o.col;
      rrect(-tw/2, -th, tw, th, 5*sc);
      X.fill();
      X.fillStyle = 'rgba(0,200,255,0.2)';
      X.fillRect(-tw/2 + tw*0.08, -th*0.84, tw*0.84, th*0.26);
      X.fillStyle = '#f1c40f';
      X.fillRect(-tw/2, -th*0.17, tw, th*0.09);
      X.fillStyle = '#333';
      X.beginPath(); X.ellipse(-tw*0.27, 0, tw*0.10, th*0.07, 0, 0, Math.PI*2); X.fill();
      X.beginPath(); X.ellipse( tw*0.27, 0, tw*0.10, th*0.07, 0, 0, Math.PI*2); X.fill();

    } else if (o.type === 'pipe') {
      var pw = sw * 1.5, ph = sh * 0.6;
      X.fillStyle = '#777';
      X.fillRect(-pw/2 - ph*0.1, -ph*3, ph*0.13, ph*3);
      X.fillRect( pw/2 - ph*0.04, -ph*3, ph*0.13, ph*3);
      X.fillStyle = '#2c3e50';
      rrect(-pw/2, -ph, pw, ph, 3*sc);
      X.fill();
      X.save();
      X.rect(-pw/2, -ph, pw, ph);
      X.clip();
      var st = 22 * sc;
      for (var s = -ph; s < pw + ph; s += st) {
        X.fillStyle = 'rgba(243,156,18,0.5)';
        X.beginPath();
        X.moveTo(-pw/2+s, -ph);
        X.lineTo(-pw/2+s+st/2, -ph);
        X.lineTo(-pw/2+s+st/2-ph, 0);
        X.lineTo(-pw/2+s-ph, 0);
        X.fill();
      }
      X.restore();
      X.fillStyle = '#fff';
      X.font = 'bold ' + Math.ceil(10*sc) + 'px Arial';
      X.textAlign = 'center';
      X.textBaseline = 'middle';
      X.fillText('DUCK!', 0, -ph/2);

    } else if (o.type === 'barrier') {
      X.fillStyle = '#888';
      X.fillRect(-sw*0.1, -sh, sw*0.2, sh);
      var bcols = ['#e74c3c','#fff','#e74c3c'];
      for (var j = 0; j < 3; j++) {
        X.fillStyle = bcols[j];
        X.fillRect(-sw/2, -sh + j*sh/3, sw, sh/3 - 2*sc);
      }
      X.fillStyle = '#555';
      X.fillRect(-sw*0.55, -sh*0.04, sw*1.1, sh*0.06);

    } else if (o.type === 'cop') {
      var lsw = Math.sin(G.t * 0.22) * 5 * sc;
      X.fillStyle = '#111';
      X.fillRect(-sw*0.22, -sh*0.44 + lsw, sw*0.28, sh*0.44);
      X.fillRect( sw*0.00, -sh*0.44 - lsw, sw*0.28, sh*0.44);
      X.fillStyle = '#1a48ff';
      rrect(-sw*0.37, -sh, sw*0.74, sh*0.58, 4*sc);
      X.fill();
      X.fillStyle = '#FFD700';
      X.font = 'bold ' + Math.ceil(9*sc) + 'px Arial';
      X.textAlign = 'center';
      X.fillText('*', 0, -sh*0.66);
      X.fillStyle = '#c68642';
      rrect(-sw*0.23, -sh*1.26, sw*0.46, sh*0.30, 5*sc);
      X.fill();
      X.fillStyle = '#111';
      X.fillRect(-sw*0.27, -sh*1.33, sw*0.54, sh*0.09);
      X.fillStyle = '#e74c3c';
      X.fillRect(-sw*0.13, -sh*1.20, sw*0.09, sh*0.07);
      X.fillRect( sw*0.04, -sh*1.20, sw*0.09, sh*0.07);

    } else if (o.type === 'bullet') {
      X.fillStyle = '#FFD700';
      X.shadowBlur = 6;
      X.shadowColor = '#FFD700';
      X.beginPath();
      X.ellipse(0, 0, sw, sh/2, 0, 0, Math.PI*2);
      X.fill();
      X.shadowBlur = 0;

    } else {
      // power-ups
      var pcol = o.type==='magnet' ? '#00f2ff' : o.type==='shield' ? '#00ff88' : '#ff8800';
      var plbl = o.type==='magnet' ? 'MAG' : o.type==='shield' ? 'SHD' : 'JET';
      X.fillStyle = pcol;
      X.shadowBlur = 14;
      X.shadowColor = pcol;
      rrect(-sw, -sw, sw*2, sw*2, sw*0.4);
      X.fill();
      X.shadowBlur = 0;
      X.fillStyle = '#fff';
      X.font = 'bold ' + Math.ceil(sw*0.9) + 'px Arial';
      X.textAlign = 'center';
      X.textBaseline = 'middle';
      X.fillText(plbl, 0, 0);
    }

    X.restore();
  }
}

// ---- draw player ----
function drawPlayer() {
  var pos = proj(G.laneF, 1.0, G.py);
  var S = LW * 0.38;
  X.save();
  X.translate(pos.x, pos.y);

  // shadow
  X.fillStyle = 'rgba(0,0,0,0.4)';
  X.beginPath();
  X.ellipse(0, 0, S*0.85, S*0.22, 0, 0, Math.PI*2);
  X.fill();

  var jh = G.pduck ? 0.52 : 1.0;
  var leg = Math.sin(G.runT) * S * 0.38;
  var arm = Math.sin(G.runT + Math.PI) * S * 0.28;

  X.save();
  X.scale(1, jh);

  // jet flame
  if (G.pjet) {
    var fh = S * (0.75 + Math.random() * 0.45);
    var fg = X.createLinearGradient(0, -S*0.15, 0, fh);
    fg.addColorStop(0, '#ff8800');
    fg.addColorStop(1, 'rgba(255,0,0,0)');
    X.fillStyle = fg;
    X.fillRect(-S*0.12, -S*0.15, S*0.24, fh);
  }

  // legs
  X.fillStyle = '#1a6090';
  X.fillRect(-S*0.36, -S*1.95 + leg, S*0.28, S*0.96);
  X.fillRect( S*0.08, -S*1.95 - leg, S*0.28, S*0.96);

  // shoes
  X.fillStyle = '#c0392b';
  X.fillRect(-S*0.40, -S*1.0 + leg, S*0.34, S*0.18);
  X.fillRect( S*0.06, -S*1.0 - leg, S*0.34, S*0.18);

  // hoodie body
  X.fillStyle = sv.color;
  rrect(-S*0.48, -S*3.1, S*0.96, S*1.22, S*0.18);
  X.fill();

  // hood (circle on top)
  X.beginPath();
  X.arc(0, -S*3.0, S*0.42, 0, Math.PI*2);
  X.fillStyle = sv.color;
  X.fill();

  // pocket detail
  X.fillStyle = 'rgba(0,0,0,0.15)';
  X.fillRect(-S*0.17, -S*2.22, S*0.34, S*0.35);

  // jetpack
  if (G.pjet) {
    X.fillStyle = '#555';
    X.fillRect(S*0.42, -S*3.0, S*0.26, S*0.75);
  }

  // arms
  X.fillStyle = sv.color;
  X.fillRect(-S*0.84, -S*3.0 + arm, S*0.34, S*0.84);
  X.fillRect( S*0.50, -S*3.0 - arm, S*0.34, S*0.84);

  // hands
  X.fillStyle = '#c68642';
  X.beginPath(); X.arc(-S*0.67, -S*2.18 + arm, S*0.16, 0, Math.PI*2); X.fill();
  X.beginPath(); X.arc( S*0.67, -S*2.18 - arm, S*0.16, 0, Math.PI*2); X.fill();

  // head
  X.fillStyle = '#c68642';
  rrect(-S*0.28, -S*3.95, S*0.56, S*0.70, S*0.13);
  X.fill();

  // cap
  X.fillStyle = '#1a1a1a';
  X.fillRect(-S*0.33, -S*4.0, S*0.66, S*0.25);

  X.restore(); // unscale jh

  // shield bubble
  if (G.shield || G.power === 'shield') {
    var al = G.shflash > 0 ? (G.shflash % 6 < 3 ? 0.12 : 0.88) : 0.45;
    X.strokeStyle = 'rgba(0,255,136,' + al + ')';
    X.lineWidth = 3;
    X.shadowBlur = 16;
    X.shadowColor = '#00ff88';
    X.beginPath();
    X.ellipse(0, -S*1.9, S*0.78, S*2.1 * jh, 0, 0, Math.PI*2);
    X.stroke();
    X.shadowBlur = 0;
  }

  X.restore();
}

// ---- draw particles ----
function drawParts() {
  for (var i = 0; i < G.parts.length; i++) {
    var p = G.parts[i];
    X.globalAlpha = p.life / 38;
    X.fillStyle = p.col;
    X.beginPath();
    X.arc(p.x, p.y, 4, 0, Math.PI*2);
    X.fill();
  }
  X.globalAlpha = 1;
}

// ---- draw power bar ----
function drawPowerBar() {
  if (!G.power && !G.pjet) return;
  var pct = G.pjet ? G.pjetT / 200 : G.powerT / 360;
  var bw = 140, bh = 6;
  var bx = W/2 - 70, by = H * 0.12;

  X.fillStyle = 'rgba(0,0,0,0.5)';
  rrect(bx, by, bw, bh, 3);
  X.fill();

  var gr = X.createLinearGradient(bx, 0, bx + bw, 0);
  gr.addColorStop(0, '#00f2ff');
  gr.addColorStop(1, '#ff00ff');
  X.fillStyle = gr;
  rrect(bx, by, bw * pct, bh, 3);
  X.fill();

  X.fillStyle = 'rgba(255,255,255,0.6)';
  X.font = '10px Arial';
  X.textAlign = 'center';
  X.fillText(G.pjet ? 'JETPACK' : G.power === 'magnet' ? 'MAGNET' : 'SHIELD', W/2, by - 3);
}

// ---- render ----
function render() {
  var sh = G.shake > 0 ? (Math.random() - 0.5) * G.shake : 0;
  X.save();
  if (sh) X.translate(sh, sh * 0.4);
  X.clearRect(0, 0, W, H);
  drawSky();
  drawCity();
  drawTrack();
  drawObjs();
  drawParts();
  drawPlayer();
  drawPowerBar();
  X.restore();
}

// ---- game loop ----
function loop() {
  if (!running) { endGame(); return; }
  update();
  render();
  requestAnimationFrame(loop);
}

function startGame() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('over').style.display = 'none';
  initG();
  running = true;
  requestAnimationFrame(loop);
}

function endGame() {
  running = false;
  sv.bank += G.coins;
  if (G.score > sv.best) sv.best = G.score;
  saveSave();
  document.getElementById('oscore').textContent = G.score;
  document.getElementById('ocoins').textContent = G.coins;
  document.getElementById('obest').innerHTML = G.score > 0 && G.score >= sv.best ? '<b style="color:gold">NEW BEST!</b>' : 'Best: <b>' + sv.best + '</b>';
  document.getElementById('over').style.display = 'flex';
  renderMenu();
}

function goMenu() {
  document.getElementById('over').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
}

// ---- input ----
function doJump() {
  var max = sv.dj ? 2 : 1;
  if (G.pjumps < max) { G.pvy = JVEL + G.pjumps * 0.1; G.pjumps++; G.pduck = false; }
}
function doDuck() { G.pduck = true; if (G.py > 0.01) G.pvy = -JVEL * 0.4; }
function doLeft()  { if (G.lane > -1) G.lane--; }
function doRight() { if (G.lane < 1)  G.lane++; }

document.addEventListener('keydown', function(e) {
  if (!running) return;
  if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === ' ') { e.preventDefault(); doJump(); }
  if (e.key === 'ArrowDown'  || e.key === 's')                   { e.preventDefault(); doDuck(); }
  if (e.key === 'ArrowLeft'  || e.key === 'a')                   { e.preventDefault(); doLeft(); }
  if (e.key === 'ArrowRight' || e.key === 'd')                   { e.preventDefault(); doRight(); }
});
document.addEventListener('keyup', function(e) {
  if ((e.key === 'ArrowDown' || e.key === 's') && G) G.pduck = false;
});

var tx = 0, ty = 0, tdone = false;
C.addEventListener('touchstart', function(e) {
  if (!running) return;
  e.preventDefault();
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
  tdone = false;
}, { passive: false });
C.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
C.addEventListener('touchend', function(e) {
  if (!running || tdone) return;
  e.preventDefault();
  tdone = true;
  var dx = e.changedTouches[0].clientX - tx;
  var dy = e.changedTouches[0].clientY - ty;
  var ax = Math.abs(dx), ay = Math.abs(dy);
  if (ax < 12 && ay < 12) { doJump(); return; }
  if (ax > ay) { if (dx < 0) doLeft(); else doRight(); }
  else         { if (dy < 0) doJump(); else doDuck(); }
}, { passive: false });

// ---- idle bg ----
function idleBg() {
  if (!running) {
    X.fillStyle = '#050510';
    X.fillRect(0, 0, W, H);
  }
  requestAnimationFrame(idleBg);
}
idleBg();

// ---- init ----
renderMenu();

</script>
</body>
