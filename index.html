<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Jake's Subway Run</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Arial Black',Arial,sans-serif;touch-action:none;user-select:none}
canvas{display:block}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:10}
#hud{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 16px}
.hud-box{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.55);border-radius:30px;padding:7px 16px}
.hud-icon{font-size:20px}
.hud-val{color:#fff;font-size:22px;font-weight:900;letter-spacing:1px;text-shadow:0 2px 4px rgba(0,0,0,0.8)}
#mult-badge{background:linear-gradient(135deg,#f39c12,#e74c3c);color:#fff;font-size:13px;font-weight:900;padding:4px 10px;border-radius:20px;letter-spacing:1px;display:none}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50}
#start-screen{background:linear-gradient(180deg,#1a0535 0%,#2d0a5e 40%,#0d2240 100%)}
#start-screen h1{font-size:clamp(40px,9vw,80px);font-weight:900;color:#fff;text-shadow:0 0 30px #ff6b00,0 0 60px #ff6b00;letter-spacing:4px;margin-bottom:2px}
.sub-title{font-size:13px;letter-spacing:5px;color:#ff6b00;margin-bottom:30px}
.menu-card{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:18px;width:min(340px,90vw);margin-bottom:12px}
.menu-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.07)}
.menu-row:last-child{border-bottom:none}
.menu-row-name{color:#fff;font-size:14px;font-weight:bold}
.menu-row-sub{color:#888;font-size:11px;margin-top:1px}
.btn{border:none;cursor:pointer;font-family:'Arial Black',Arial,sans-serif;font-weight:900;letter-spacing:1px;transition:transform .1s}
.btn:active{transform:scale(.95)}
.btn-gold{background:linear-gradient(135deg,#f1c40f,#f39c12);color:#000;padding:8px 16px;border-radius:10px;font-size:12px}
.btn-owned{background:#1a4a1a;color:#4ade80;padding:8px 16px;border-radius:10px;font-size:12px}
.btn-locked{background:#2a2a2a;color:#555;padding:8px 16px;border-radius:10px;font-size:12px;cursor:default}
.btn-run{background:linear-gradient(135deg,#ff6b00,#e74c3c);color:#fff;padding:16px 90px;font-size:24px;border-radius:50px;box-shadow:0 0 30px rgba(255,107,0,.7)}
.tabs{display:flex;gap:0;border-radius:12px;overflow:hidden;border:1px solid #333;margin-bottom:14px}
.tab{padding:9px 22px;background:#111;color:#888;font-size:12px;font-weight:bold;cursor:pointer;letter-spacing:1px}
.tab.on{background:#222;color:#fff}
.tc{display:none;width:min(340px,90vw)}.tc.on{display:block}
.bank-row{color:gold;font-size:15px;letter-spacing:1px;margin-bottom:14px;text-align:center}
.diff-btns{display:flex;gap:6px}
.dbtn{background:#222;border:2px solid #333;color:#888;padding:7px 14px;border-radius:8px;font-size:11px;font-weight:bold;cursor:pointer}
.dbtn.on{border-color:#ff6b00;color:#fff;background:#3a1500}

#go-screen{background:rgba(0,0,0,.93);display:none}
#go-screen h2{font-size:52px;color:#e74c3c;text-shadow:0 0 20px #e74c3c;margin-bottom:10px}
.go-row{color:#aaa;font-size:15px;margin:4px 0}
.go-row b{color:#fff}
.btn-green{background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff;padding:14px 70px;font-size:20px;border-radius:50px;margin-top:24px;margin-bottom:10px}
.btn-outline{background:transparent;border:2px solid #444;color:#888;padding:10px 44px;font-size:14px;border-radius:50px}

#swipe-hint{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:12px;letter-spacing:2px;pointer-events:none;z-index:10}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div id="hud">
    <div class="hud-box"><div class="hud-icon">🪙</div><div class="hud-val" id="h-coins">0</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div id="mult-badge">✕<span id="h-mult">1</span></div>
      <div class="hud-box"><div class="hud-icon">⭐</div><div class="hud-val" id="h-score">0</div></div>
    </div>
  </div>
</div>

<div id="swipe-hint">SWIPE OR ARROW KEYS</div>

<!-- START SCREEN -->
<div class="screen" id="start-screen">
  <h1>SUBWAY RUN</h1>
  <div class="sub-title">JAKE'S ESCAPE</div>

  <div class="bank-row">💰 BANK: <span id="bank-val">0</span> &nbsp;|&nbsp; 🏆 BEST: <span id="best-val">0</span></div>

  <div class="tabs">
    <div class="tab on" onclick="showTab('shop')">SHOP</div>
    <div class="tab" onclick="showTab('opt')">OPTIONS</div>
    <div class="tab" onclick="showTab('style')">STYLE</div>
  </div>

  <div class="tc on" id="tc-shop">
    <div class="menu-card" id="shop-card"></div>
  </div>

  <div class="tc" id="tc-opt">
    <div class="menu-card">
      <div class="menu-row">
        <div><div class="menu-row-name">Difficulty</div></div>
        <div class="diff-btns">
          <div class="dbtn on" id="d-easy" onclick="setDiff('easy',this)">EASY</div>
          <div class="dbtn" id="d-hard" onclick="setDiff('hard',this)">HARD</div>
          <div class="dbtn" id="d-god" onclick="setDiff('god',this)">GOD</div>
        </div>
      </div>
      <div class="menu-row" style="cursor:pointer" onclick="if(confirm('Reset all progress?')){resetSave()}">
        <div><div class="menu-row-name" style="color:#e74c3c">Reset Progress</div></div>
        <div style="color:#555;font-size:20px">✕</div>
      </div>
    </div>
  </div>

  <div class="tc" id="tc-style">
    <div class="menu-card">
      <div class="menu-row">
        <div class="menu-row-name">Hoodie Color</div>
        <input type="color" id="color-pick" value="#ff4400" oninput="save.color=this.value;persist();drawPreview()" style="width:48px;height:34px;border:none;cursor:pointer;border-radius:8px;background:none">
      </div>
      <div class="menu-row">
        <div class="menu-row-name">Skin Tone</div>
        <div style="display:flex;gap:8px" id="skins"></div>
      </div>
    </div>
  </div>

  <button class="btn btn-run" onclick="startGame()" style="margin-top:18px">▶ RUN</button>
</div>

<!-- GAME OVER -->
<div class="screen" id="go-screen">
  <h2>BUSTED!</h2>
  <div class="go-row">Score: <b id="go-score">0</b></div>
  <div class="go-row">Coins collected: <b id="go-coins">0</b></div>
  <div class="go-row" id="go-best-row"></div>
  <button class="btn btn-green" onclick="startGame()">RETRY</button>
  <button class="btn btn-outline" onclick="showMenu()">MENU</button>
</div>

<script>
// ─── save ────────────────────────────────────────────────────────────────────
const SKINS=['#ffdbac','#c68642','#8d5524'];
const SHOP_ITEMS=[
  {id:'dj',   name:'Double Jump',   desc:'Jump again mid-air',        cost:50},
  {id:'mag',  name:'Coin Magnet',   desc:'Auto-collect nearby coins', cost:150},
  {id:'shield',name:'Start Shield', desc:'One free hit at start',     cost:200},
  {id:'jet',  name:'Jetpack Drop',  desc:'Jetpack power-up spawns',   cost:350},
  {id:'x2',   name:'Score ×2',      desc:'Double all score',          cost:600},
];
let save=JSON.parse(localStorage.getItem('srV5'))||{bank:0,best:0,dj:false,mag:false,shield:false,jet:false,x2:false,color:'#ff4400',skin:0,diff:'easy'};
const persist=()=>localStorage.setItem('srV5',JSON.stringify(save));

// ─── canvas setup ─────────────────────────────────────────────────────────────
const C=document.getElementById('c');
const cx=C.getContext('2d');
C.width=window.innerWidth; C.height=window.innerHeight;
const W=C.width,H=C.height;

// ─── perspective constants ────────────────────────────────────────────────────
const VX=W/2;          // vanishing point X
const VY=H*0.30;       // vanishing point Y (horizon)
const GY=H*0.88;       // ground Y at player
const LANE_W=W*0.18;   // lane half-width at player z=1
const WALL_H=H*0.55;   // wall height at player

// project world coords to screen
// z: 0=horizon, 1=at player
// lx: lane offset in world units (-1,0,1)
function proj(lx,lz,wy=0){
  const t=Math.max(0.0001,lz);
  const sx=VX+lx*LANE_W*t;
  const sy=VY+(GY-VY)*t - wy*t*120;
  const sc=t;
  return{sx,sy,sc};
}

// ─── game state ───────────────────────────────────────────────────────────────
const DIFFS={
  easy:{spd:0.012,acc:0.0000020,gap:1.8,cops:0.18},
  hard:{spd:0.018,acc:0.0000035,gap:1.3,cops:0.28},
  god: {spd:0.028,acc:0.0000060,gap:0.9,cops:0.40},
};
let G={};

function initGame(){
  const d=DIFFS[save.diff];
  G={
    running:false,
    t:0,
    spd:d.spd,
    acc:d.acc,
    gapZ:d.gap,
    score:0,
    coins:0,
    lane:0,        // -1 left, 0 center, 1 right
    laneF:0,       // float lane for smooth lerp
    player:{
      y:0,         // height above ground (0=ground)
      vy:0,
      duck:false,
      jumps:0,
      jet:false,
      jetT:0,
    },
    shield:save.shield,
    shieldHit:0,
    objs:[],
    parts:[],
    bgSeed:Math.random()*1000,
    nextObs:d.gap,
    power:null,
    powerT:0,
    mult:save.x2?2:1,
    shake:0,
    runT:0,
  };
}

// ─── spawning ─────────────────────────────────────────────────────────────────
const OBS_TYPES=['train','train','barrier','pipe','cop','cop'];
const PU_TYPES=['magnet','shield_pu','jetpack'];

function spawnWave(){
  // coins ribbon
  if(Math.random()<0.6){
    const lane=[-1,0,1][Math.floor(Math.random()*3)];
    const elevated=Math.random()<0.3;
    const count=4+Math.floor(Math.random()*6);
    for(let i=0;i<count;i++){
      G.objs.push({type:'coin',lane,z:0.0,dz:-0.04-i*0.018,wy:elevated?0.7:0,w:0.18,h:0.18});
    }
  }
  // obstacle
  const otype=OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)];
  const lanes=[-1,0,1];
  const d=DIFFS[save.diff];

  if(otype==='train'){
    // block 1 or 2 lanes with trains
    const shuffled=[...lanes].sort(()=>Math.random()-0.5);
    const blocked=1+Math.floor(Math.random()*2);
    shuffled.slice(0,blocked).forEach(l=>{
      G.objs.push({type:'train',lane:l,z:0.0,dz:-0.015,wy:0,w:0.9,h:1.2,col:'#'+(Math.random()<0.5?'e74c3c':'3498db')});
    });
  } else if(otype==='pipe'){
    const l=lanes[Math.floor(Math.random()*3)];
    G.objs.push({type:'pipe',lane:l,z:0.0,dz:-0.015,wy:0.4,w:1.1,h:0.35});
  } else if(otype==='barrier'){
    const l=lanes[Math.floor(Math.random()*3)];
    G.objs.push({type:'barrier',lane:l,z:0.0,dz:-0.015,wy:0,w:0.35,h:1.1});
  } else if(otype==='cop'){
    const l=lanes[Math.floor(Math.random()*3)];
    G.objs.push({type:'cop',lane:l,z:0.0,dz:-0.015,wy:0,w:0.55,h:1.2,shotZ:0.55,shot:false});
  }

  // power-up chance
  if(save.jet&&Math.random()<0.15||(Math.random()<0.08)){
    const pt=PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)];
    G.objs.push({type:pt,lane:lanes[Math.floor(Math.random()*3)],z:0.0,dz:-0.016,wy:0.6,w:0.28,h:0.28});
  }
}

// ─── physics ──────────────────────────────────────────────────────────────────
const GRAVITY=0.028;
const JUMP_VEL=0.38;
const GROUND=0;

function updatePhysics(){
  const p=G.player;
  G.laneF+=(G.lane-G.laneF)*0.2;

  if(p.jet){
    p.jetT--;
    p.vy=-0.06;
    if(p.jetT<=0)p.jet=false;
  } else {
    p.vy-=GRAVITY;
  }
  p.y+=p.vy;
  if(p.y<=GROUND){p.y=GROUND;p.vy=0;p.jumps=0;p.duck=false;}
  G.runT+=G.spd*40;
}

// ─── collision ────────────────────────────────────────────────────────────────
function checkCollision(){
  const p=G.player;
  const playerH=p.duck?0.4:1.0;

  G.objs=G.objs.filter(o=>{
    if(o.z<-0.1)return false;

    // advance
    o.z+=o.dz*G.spd/0.015;

    // cop shoots
    if(o.type==='cop'&&!o.shot&&o.z>o.shotZ){
      o.shot=true;
      G.objs.push({type:'bullet',lane:o.lane,z:o.z,dz:-0.06,wy:0.3,w:0.12,h:0.07});
    }

    // magnet pull
    if((save.mag||G.power==='magnet')&&o.type==='coin'){
      if(Math.abs(o.lane-G.laneF)<0.8&&o.z>0.6){
        o.lane+=(G.laneF-o.lane)*0.12;
        o.wy+=(p.y+0.1-o.wy)*0.1;
      }
    }

    if(o.z<0.72||o.z>1.08)return true;

    // lane check
    if(Math.abs(o.lane-G.laneF)>0.65)return true;

    // height check
    const oTop=o.wy+o.h;
    const pTop=p.y+playerH;
    if(p.y>oTop||pTop<o.wy)return true;

    // HIT
    if(o.type==='coin'){
      G.coins++;
      spawnParts(proj(o.lane,0.88,o.wy),'#FFD700',6);
      return false;
    }
    if(o.type==='magnet'||o.type==='shield_pu'||o.type==='jetpack'){
      activatePower(o.type);
      return false;
    }
    // obstacle hit
    if(p.jet){spawnParts(proj(o.lane,0.9,o.wy),'#ff8800',8);return false;}
    if(G.shield||G.power==='shield_pu'){
      G.shield=false;G.power=null;G.shieldHit=30;
      spawnParts(proj(o.lane,0.9,o.wy),'#00ff88',10);
      return false;
    }
    if(G.shake<1)G.shake=18;
    G.running=false;
    return true;
  });

  if(G.power){
    G.powerT--;
    if(G.powerT<=0){G.power=null;}
  }
  if(G.shieldHit>0)G.shieldHit--;
  if(G.shake>0)G.shake*=0.85;
}

function activatePower(type){
  if(type==='jetpack'){G.player.jet=true;G.player.jetT=220;}
  else{G.power=type;G.powerT=380;}
  spawnParts(proj(G.laneF,0.88,0.6),'#ff8800',10);
}

// ─── particles ────────────────────────────────────────────────────────────────
function spawnParts({sx,sy},col,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const v=1+Math.random()*4;
    G.parts.push({x:sx,y:sy,vx:Math.cos(a)*v,vy:Math.sin(a)*v-2,life:30+Math.random()*20,col});
  }
}
function updateParts(){
  G.parts=G.parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;return p.life>0;});
}

// ─── main loop ────────────────────────────────────────────────────────────────
function update(){
  G.t++;
  G.spd=DIFFS[save.diff].spd+G.t*G.acc;
  G.score=Math.floor(G.t*G.spd*60*G.mult);
  document.getElementById('h-score').textContent=G.score;
  document.getElementById('h-coins').textContent=G.coins;

  G.nextObs-=G.spd;
  if(G.nextObs<=0){spawnWave();G.nextObs=G.gapZ+(Math.random()*0.4);}

  updatePhysics();
  checkCollision();
  updateParts();
}

// ─── draw helpers ─────────────────────────────────────────────────────────────
function drawBg(){
  // sky
  const sky=cx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0d0520');
  sky.addColorStop(0.4,'#1a0a35');
  sky.addColorStop(1,'#0a1a30');
  cx.fillStyle=sky;cx.fillRect(0,0,W,H);

  // stars
  for(let i=0;i<80;i++){
    const sx=((i*137.5+G.t*0.15)%W);
    const sy=((i*89.3)%(VY*0.9));
    cx.fillStyle=`rgba(255,255,255,${0.3+0.4*(i%3===0?1:0)})`;
    cx.fillRect(sx,sy,i%5===0?2:1,i%5===0?2:1);
  }

  // moon
  cx.beginPath();cx.arc(W*0.82,H*0.08,28,0,Math.PI*2);
  cx.fillStyle='rgba(255,240,180,0.9)';cx.fill();
  cx.beginPath();cx.arc(W*0.82+10,H*0.08-5,22,0,Math.PI*2);
  cx.fillStyle='#1a0535';cx.fill();
}

function drawBuildings(){
  // side walls / buildings using perspective
  const seed=G.bgSeed;
  // left wall
  cx.save();
  const leftEdge=proj(-1.9,0.0);
  const leftBase=proj(-1.9,1.0);
  // wall face
  const wg=cx.createLinearGradient(leftEdge.sx,0,leftBase.sx,0);
  wg.addColorStop(0,'#0a0a20');wg.addColorStop(1,'#151530');
  cx.fillStyle=wg;
  cx.beginPath();
  cx.moveTo(0,0);cx.lineTo(leftEdge.sx,VY);cx.lineTo(leftBase.sx,GY);cx.lineTo(0,H);
  cx.closePath();cx.fill();

  // right wall
  const rightEdge=proj(1.9,0.0);
  const rightBase=proj(1.9,1.0);
  const wg2=cx.createLinearGradient(rightEdge.sx,0,rightBase.sx,0);
  wg2.addColorStop(0,'#0a0a20');wg2.addColorStop(1,'#151530');
  cx.fillStyle=wg2;
  cx.beginPath();
  cx.moveTo(W,0);cx.lineTo(rightEdge.sx,VY);cx.lineTo(rightBase.sx,GY);cx.lineTo(W,H);
  cx.closePath();cx.fill();
  cx.restore();

  // building silhouettes
  const buildings=[
    {x:0.05,w:0.12,h:0.55,col:'#0d0d22'},{x:0.0,w:0.08,h:0.42,col:'#111128'},
    {x:0.18,w:0.09,h:0.38,col:'#0e0e1e'},{x:0.68,w:0.14,h:0.60,col:'#0d0d22'},
    {x:0.80,w:0.10,h:0.45,col:'#111128'},{x:0.90,w:0.12,h:0.35,col:'#0e0e1e'},
  ];
  buildings.forEach(b=>{
    const bx=b.x*W,bw=b.w*W,bh=b.h*(H-GY*0.4);
    const by=VY*0.8-bh;
    cx.fillStyle=b.col;
    cx.fillRect(bx,by,bw,bh+VY*0.2);
    // windows
    for(let wy=by+8;wy<by+bh-10;wy+=16){
      for(let wx=bx+6;wx<bx+bw-6;wx+=14){
        const lit=Math.sin(wx*7.3+wy*3.1+seed)>0.2;
        if(lit){cx.fillStyle='rgba(255,220,100,0.35)';cx.fillRect(wx,wy,8,10);}
      }
    }
  });

  // graffiti / neon signs on walls
  drawNeonSign(W*0.07,VY+30,'SURF','#ff6b00');
  drawNeonSign(W*0.87,VY+60,'CITY','#00f2ff');
  drawNeonSign(W*0.03,VY+90,'RUN','#ff00ff');
  drawNeonSign(W*0.91,VY+100,'SUB','#f1c40f');
}

function drawNeonSign(x,y,text,col){
  cx.save();
  cx.font=`bold ${14+Math.sin(G.t*0.07)*2}px Arial Black`;
  cx.textAlign='center';cx.textBaseline='top';
  cx.shadowBlur=12;cx.shadowColor=col;
  cx.fillStyle=col;
  cx.globalAlpha=0.7+0.3*Math.sin(G.t*0.05+x);
  cx.fillText(text,x,y);
  cx.shadowBlur=0;cx.globalAlpha=1;
  cx.restore();
}

function drawTrack(){
  // ground platform
  const groundGrad=cx.createLinearGradient(0,VY,0,H);
  groundGrad.addColorStop(0,'#1a1030');
  groundGrad.addColorStop(0.2,'#111020');
  groundGrad.addColorStop(1,'#0a0a18');
  cx.fillStyle=groundGrad;
  // draw ground trapezoid
  const ll=proj(-3.2,0.0),lr=proj(3.2,0.0);
  cx.beginPath();
  cx.moveTo(ll.sx,VY);cx.lineTo(lr.sx,VY);
  cx.lineTo(W,H);cx.lineTo(0,H);
  cx.closePath();cx.fill();

  // rail tracks
  for(let t=-1;t<=1;t+=1){
    for(let rail=-0.08;rail<=0.08;rail+=0.16){
      const z0=proj(t*1.5+rail,0.01),z1=proj(t*1.5+rail,1.05);
      cx.beginPath();cx.moveTo(z0.sx,z0.sy);cx.lineTo(z1.sx,z1.sy);
      cx.strokeStyle='rgba(120,120,200,0.6)';cx.lineWidth=2;cx.stroke();
    }
  }

  // sleepers / ties
  const tieCount=20;
  for(let i=0;i<tieCount;i++){
    const frac=(i/tieCount+((G.t*G.spd)%1))*1.05;
    if(frac>1.05)continue;
    const z=frac;
    const tl=proj(-1.7,z),tr=proj(1.7,z);
    cx.beginPath();cx.moveTo(tl.sx,tl.sy);cx.lineTo(tr.sx,tr.sy);
    cx.strokeStyle=`rgba(80,80,160,${0.2+z*0.3})`;
    cx.lineWidth=Math.max(1,z*4);cx.stroke();
  }

  // glowing edge line at horizon
  cx.beginPath();
  const hl=proj(-3,0.0),hr=proj(3,0.0);
  cx.moveTo(0,VY);cx.lineTo(W,VY);
  cx.strokeStyle='rgba(160,100,255,0.4)';cx.lineWidth=2;cx.stroke();

  // lane glow lines
  [-1,0,1].forEach(l=>{
    const bot=proj(l,1.0),top=proj(l,0.0);
    cx.beginPath();cx.moveTo(top.sx,top.sy);cx.lineTo(bot.sx,bot.sy);
    cx.strokeStyle='rgba(255,255,255,0.05)';cx.setLineDash([8,20]);
    cx.lineDashOffset=-(G.t*G.spd*80)%28;
    cx.lineWidth=1;cx.stroke();cx.setLineDash([]);
  });
}

// ─── object drawing ───────────────────────────────────────────────────────────
function drawObjects(){
  // sort far-first
  const sorted=[...G.objs].sort((a,b)=>a.z-b.z);
  sorted.forEach(o=>{
    if(o.z<0.02||o.z>1.12)return;
    const{sx,sy,sc}=proj(o.lane,o.z,o.wy);
    const sw=o.w*LANE_W*sc*1.4;
    const sh=o.h*LANE_W*sc*1.4;

    cx.save();
    cx.translate(sx,sy);

    if(o.type==='coin'){
      const spin=Math.sin(G.t*0.15+o.lane*1.7+o.z*8);
      cx.scale(spin*sc,sc);
      cx.beginPath();cx.arc(0,0,12,0,Math.PI*2);
      cx.fillStyle='#FFD700';
      cx.shadowBlur=10;cx.shadowColor='#FFD700';
      cx.fill();cx.shadowBlur=0;
      cx.fillStyle='#000';cx.font=`bold ${11}px Arial`;
      cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('$',0,0);

    } else if(o.type==='train'){
      const tw=sw*1.1,th=sh;
      cx.fillStyle=o.col||'#e74c3c';
      // body
      cx.beginPath();cx.roundRect(-tw/2,-th,tw,th,4*sc);cx.fill();
      // window strip
      cx.fillStyle='rgba(0,200,255,0.25)';
      cx.fillRect(-tw/2+tw*0.08,-th*0.85,tw*0.84,th*0.28);
      // yellow bottom stripe
      cx.fillStyle='#f1c40f';cx.fillRect(-tw/2,-th*0.18,tw,th*0.1);
      // wheel bumps
      cx.fillStyle='#333';
      [-0.3,0.3].forEach(dx=>{
        cx.beginPath();cx.ellipse(dx*tw,0,tw*0.12,th*0.08,0,0,Math.PI*2);cx.fill();
      });
      // front light glow
      cx.fillStyle='rgba(255,255,180,0.5)';
      cx.beginPath();cx.ellipse(0,-th*0.05,tw*0.15,th*0.08,0,0,Math.PI*2);cx.fill();

    } else if(o.type==='pipe'){
      // low pipe = duck under
      const pw=sw*1.5,ph=sh*0.6;
      // support poles on sides
      cx.fillStyle='#888';
      cx.fillRect(-pw/2-ph*0.1,-ph*3,ph*0.15,ph*3);
      cx.fillRect(pw/2-ph*0.05,-ph*3,ph*0.15,ph*3);
      // pipe body with stripes
      cx.fillStyle='#2c3e50';
      cx.beginPath();cx.roundRect(-pw/2,-ph,pw,ph,3*sc);cx.fill();
      cx.save();cx.rect(-pw/2,-ph,pw,ph);cx.clip();
      for(let s=-ph;s<pw+ph;s+=24*sc){
        cx.fillStyle='rgba(243,156,18,0.6)';
        cx.beginPath();
        cx.moveTo(-pw/2+s,-ph);cx.lineTo(-pw/2+s+12*sc,-ph);
        cx.lineTo(-pw/2+s+12*sc-ph,-0);cx.lineTo(-pw/2+s-ph,-0);cx.fill();
      }
      cx.restore();
      cx.fillStyle='#fff';cx.font=`bold ${12*sc}px Arial Black`;
      cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('DUCK!',0,-ph/2);

    } else if(o.type==='barrier'){
      const bw=sw,bh=sh;
      // pole
      cx.fillStyle='#888';cx.fillRect(-bw*0.1,-bh,bw*0.2,bh);
      // colored bands
      ['#e74c3c','#fff','#e74c3c'].forEach((col,i)=>{
        cx.fillStyle=col;cx.fillRect(-bw/2,-bh+i*bh/3,bw,bh/3-2*sc);
      });
      // base plate
      cx.fillStyle='#555';cx.fillRect(-bw*0.6,-bh*0.05,bw*1.2,bh*0.07);

    } else if(o.type==='cop'){
      // legs
      cx.fillStyle='#111';
      const legSwing=Math.sin(G.t*0.25)*6*sc;
      cx.fillRect(-sw*0.22,-sh*0.45+legSwing,sw*0.3,sh*0.45);
      cx.fillRect(sw*0.0,-sh*0.45-legSwing,sw*0.3,sh*0.45);
      // body
      cx.fillStyle='#1e4dff';
      cx.beginPath();cx.roundRect(-sw*0.38,-sh,sw*0.76,sh*0.6,4*sc);cx.fill();
      // badge
      cx.fillStyle='#FFD700';cx.font=`bold ${10*sc}px Arial`;cx.textAlign='center';
      cx.fillText('★',0,-sh*0.68);
      // head
      cx.fillStyle=SKINS[1];
      cx.beginPath();cx.roundRect(-sw*0.24,-sh*1.28,sw*0.48,sh*0.32,5*sc);cx.fill();
      // cap
      cx.fillStyle='#111';cx.fillRect(-sw*0.28,-sh*1.35,sw*0.56,sh*0.1);
      // eyes (red - angry)
      cx.fillStyle='#e74c3c';
      cx.fillRect(-sw*0.14,-sh*1.22,sw*0.1,sh*0.08);
      cx.fillRect(sw*0.04,-sh*1.22,sw*0.1,sh*0.08);

    } else if(o.type==='bullet'){
      cx.fillStyle='#FFD700';cx.shadowBlur=8;cx.shadowColor='#FFD700';
      cx.beginPath();cx.ellipse(0,0,sw,sh/2,0,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;

    } else if(o.type==='magnet'){
      cx.rotate(Math.sin(G.t*0.08)*0.3);
      cx.font=`${sw*2.4}px serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.shadowBlur=15;cx.shadowColor='#00f2ff';cx.fillText('🧲',0,0);cx.shadowBlur=0;
    } else if(o.type==='shield_pu'){
      cx.font=`${sw*2.4}px serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.shadowBlur=15;cx.shadowColor='#00ff88';cx.fillText('🛡️',0,0);cx.shadowBlur=0;
    } else if(o.type==='jetpack'){
      cx.font=`${sw*2.4}px serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.shadowBlur=15;cx.shadowColor='#ff8800';cx.fillText('🚀',0,0);cx.shadowBlur=0;
    }

    cx.restore();
  });
}

// ─── player drawing ───────────────────────────────────────────────────────────
function drawPlayer(){
  const p=G.player;
  const{sx,sy}=proj(G.laneF,1.0,p.y);
  const SCALE=1;
  const S=LANE_W*0.4*SCALE; // base unit

  cx.save();
  cx.translate(sx,sy);

  // shadow
  cx.fillStyle='rgba(0,0,0,0.5)';
  cx.beginPath();cx.ellipse(0,0,S*0.9,S*0.25,0,0,Math.PI*2);cx.fill();

  const duck=p.duck;
  const leg=Math.sin(G.runT)*S*0.4;
  const arm=Math.sin(G.runT+Math.PI)*S*0.3;
  const jh=duck?0.5:1.0;

  cx.save();cx.scale(1,jh);

  // jetpack flame
  if(p.jet){
    const fh=S*(0.8+Math.random()*0.5);
    const fg=cx.createLinearGradient(0,-S*0.2,0,fh);
    fg.addColorStop(0,'#ff8800');fg.addColorStop(1,'rgba(255,0,0,0)');
    cx.fillStyle=fg;
    cx.fillRect(-S*0.15,-S*0.2,S*0.3,fh);
  }

  // legs
  cx.fillStyle='#2471a3';
  cx.fillRect(-S*0.38,-S*2.0+leg,S*0.32,S*1.0);
  cx.fillRect(S*0.06,-S*2.0-leg,S*0.32,S*1.0);
  // shoes
  cx.fillStyle='#e74c3c';
  cx.fillRect(-S*0.42,-S*1.02+leg,S*0.38,S*0.2);
  cx.fillRect(S*0.04,-S*1.02-leg,S*0.38,S*0.2);

  // body (hoodie back)
  cx.fillStyle=save.color;
  cx.beginPath();cx.roundRect(-S*0.5,-S*3.2,S*1.0,S*1.3,S*0.2);cx.fill();
  // hood
  cx.beginPath();cx.arc(0,-S*3.1,S*0.45,0,Math.PI*2);cx.fill();
  // hoodie pocket / detail
  cx.fillStyle='rgba(0,0,0,0.2)';cx.fillRect(-S*0.2,-S*2.3,S*0.4,S*0.4);

  // jetpack (if owned/active)
  if(p.jet){
    cx.fillStyle='#555';cx.fillRect(S*0.45,-S*3.1,S*0.3,S*0.8);
    cx.fillStyle='#e74c3c';cx.fillRect(S*0.47,-S*3.0,S*0.26,S*0.3);
  }

  // arms
  cx.fillStyle=save.color;
  cx.fillRect(-S*0.9,-S*3.1+arm,S*0.38,S*0.9);
  cx.fillRect(S*0.52,-S*3.1-arm,S*0.38,S*0.9);
  // hands
  cx.fillStyle=SKINS[save.skin];
  cx.beginPath();cx.arc(-S*0.71,-S*2.25+arm,S*0.18,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(S*0.71,-S*2.25-arm,S*0.18,0,Math.PI*2);cx.fill();

  // head
  cx.fillStyle=SKINS[save.skin];
  cx.beginPath();cx.roundRect(-S*0.32,-S*4.1,S*0.64,S*0.76,S*0.15);cx.fill();
  // cap / hair at back
  cx.fillStyle='#222';cx.fillRect(-S*0.36,-S*4.15,S*0.72,S*0.28);

  cx.restore();

  // shield bubble
  if(G.shield||G.power==='shield_pu'){
    const alpha=G.shieldHit>0?(G.shieldHit%6<3?0.2:0.9):0.5;
    cx.strokeStyle=`rgba(0,255,136,${alpha})`;cx.lineWidth=3;
    cx.shadowBlur=20;cx.shadowColor='#00ff88';
    cx.beginPath();cx.ellipse(0,-S*2,S*0.85,S*2.3*jh,0,0,Math.PI*2);cx.stroke();
    cx.shadowBlur=0;
  }

  cx.restore();
}

function drawParticles(){
  G.parts.forEach(p=>{
    cx.globalAlpha=p.life/50;
    cx.fillStyle=p.col;
    cx.beginPath();cx.arc(p.x,p.y,4,0,Math.PI*2);cx.fill();
  });
  cx.globalAlpha=1;
}

function drawPowerBar(){
  if(!G.power&&!G.player.jet)return;
  const pct=G.player.jet?G.player.jetT/220:G.powerT/380;
  const bw=160,bh=8,bx=W/2-bw/2,by=H*0.13;
  cx.fillStyle='rgba(0,0,0,0.5)';cx.beginPath();cx.roundRect(bx,by,bw,bh,4);cx.fill();
  const grad=cx.createLinearGradient(bx,0,bx+bw,0);
  grad.addColorStop(0,'#00f2ff');grad.addColorStop(1,'#ff00ff');
  cx.fillStyle=grad;cx.beginPath();cx.roundRect(bx,by,bw*pct,bh,4);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.7)';cx.font='10px Arial Black';cx.textAlign='center';
  const label=G.player.jet?'JETPACK':G.power==='magnet'?'MAGNET':G.power==='shield_pu'?'SHIELD':'';
  cx.fillText(label,W/2,by-4);
}

// ─── render ───────────────────────────────────────────────────────────────────
function render(){
  const sh=G.shake>0?(Math.random()-0.5)*G.shake:0;
  cx.save();if(sh)cx.translate(sh,sh*0.4);
  cx.clearRect(0,0,W,H);
  drawBg();
  drawBuildings();
  drawTrack();
  drawObjects();
  drawParticles();
  drawPlayer();
  drawPowerBar();
  cx.restore();
}

// ─── game loop ────────────────────────────────────────────────────────────────
function loop(){
  if(!G.running){endGame();return;}
  update();render();
  requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('start-screen').style.display='none';
  document.getElementById('go-screen').style.display='none';
  document.getElementById('swipe-hint').style.display='none';
  initGame();
  G.running=true;
  requestAnimationFrame(loop);
}
function endGame(){
  G.running=false;
  save.bank+=G.coins;
  if(G.score>save.best)save.best=G.score;
  persist();
  document.getElementById('go-score').textContent=G.score;
  document.getElementById('go-coins').textContent=G.coins;
  document.getElementById('go-best-row').innerHTML=G.score>=save.best&&G.score>0?'🏆 <b>New Best!</b>':'Best: <b>'+save.best+'</b>';
  document.getElementById('go-screen').style.display='flex';
  updateUI();
}
function showMenu(){
  document.getElementById('go-screen').style.display='none';
  document.getElementById('start-screen').style.display='flex';
  document.getElementById('swipe-hint').style.display='none';
  // idle render
  function idleLoop(){
    if(document.getElementById('start-screen').style.display!=='none'){
      cx.fillStyle='#06060f';cx.fillRect(0,0,W,H);
      requestAnimationFrame(idleLoop);
    }
  }
  idleLoop();
}

// ─── input ────────────────────────────────────────────────────────────────────
function doJump(){
  const p=G.player;
  const max=save.dj?2:1;
  if(p.jumps<max){p.vy=JUMP_VEL+p.jumps*0.1;p.jumps++;p.duck=false;}
}
function doDuck(){G.player.duck=true;if(G.player.y>0.01)G.player.vy=-JUMP_VEL*0.5;}
function doLeft(){if(G.lane>-1)G.lane--;}
function doRight(){if(G.lane<1)G.lane++;}

document.addEventListener('keydown',e=>{
  if(!G.running)return;
  if(e.key==='ArrowUp'||e.key==='w'||e.key===' '){e.preventDefault();doJump();}
  if(e.key==='ArrowDown'||e.key==='s'){e.preventDefault();doDuck();}
  if(e.key==='ArrowLeft'||e.key==='a'){e.preventDefault();doLeft();}
  if(e.key==='ArrowRight'||e.key==='d'){e.preventDefault();doRight();}
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowDown'||e.key==='s')G.player.duck=false;
});

let tx=0,ty=0,td=false;
C.addEventListener('touchstart',e=>{
  if(!G.running)return;
  e.preventDefault();tx=e.touches[0].clientX;ty=e.touches[0].clientY;td=false;
},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();},{passive:false});
C.addEventListener('touchend',e=>{
  if(!G.running)return;
  e.preventDefault();
  if(td)return;td=true;
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  const adx=Math.abs(dx),ady=Math.abs(dy);
  if(adx<10&&ady<10){doJump();return;}
  if(adx>ady){if(dx<0)doLeft();else doRight();}
  else{if(dy<0)doJump();else doDuck();}
},{passive:false});

// ─── UI ───────────────────────────────────────────────────────────────────────
function showTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tc').forEach(t=>t.classList.remove('on'));
  document.getElementById('tc-'+name).classList.add('on');
  const idx={shop:0,opt:1,style:2}[name];
  document.querySelectorAll('.tab')[idx].classList.add('on');
}
function setDiff(d,el){
  save.diff=d;persist();
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}
function buyItem(id,cost){
  if(save[id]||save.bank<cost)return;
  save.bank-=cost;save[id]=true;persist();updateUI();
}
function resetSave(){
  localStorage.removeItem('srV5');
  save={bank:0,best:0,dj:false,mag:false,shield:false,jet:false,x2:false,color:'#ff4400',skin:0,diff:'easy'};
  updateUI();
}
function setSkin(i){
  save.skin=i;persist();
  document.querySelectorAll('.skin-dot').forEach((el,j)=>el.style.outline=j===i?'3px solid #fff':'none');
}

function updateUI(){
  document.getElementById('bank-val').textContent=save.bank;
  document.getElementById('best-val').textContent=save.best;
  document.getElementById('color-pick').value=save.color;
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.remove('on'));
  const de=document.getElementById('d-'+save.diff);if(de)de.classList.add('on');

  // shop
  const shopHTML=SHOP_ITEMS.map(it=>{
    const owned=save[it.id];
    const canBuy=!owned&&save.bank>=it.cost;
    const cls=owned?'btn-owned':canBuy?'btn-gold':'btn-locked';
    const txt=owned?'✓ OWNED':'🪙 '+it.cost;
    return `<div class="menu-row">
      <div><div class="menu-row-name">${it.name}</div><div class="menu-row-sub">${it.desc}</div></div>
      <button class="btn ${cls}" onclick="buyItem('${it.id}',${it.cost})">${txt}</button>
    </div>`;
  }).join('');
  document.getElementById('shop-card').innerHTML=shopHTML;

  // skins
  const skinHTML=SKINS.map((col,i)=>
    `<div class="skin-dot" onclick="setSkin(${i})" style="width:28px;height:28px;border-radius:50%;background:${col};cursor:pointer;outline:${save.skin===i?'3px solid #fff':'none'};outline-offset:2px"></div>`
  ).join('');
  document.getElementById('skins').innerHTML=skinHTML;

  // mult badge
  if(save.x2){
    document.getElementById('mult-badge').style.display='block';
    document.getElementById('h-mult').textContent='2';
  }
}

// idle canvas while on menu
(function idleLoop(){
  if(document.getElementById('start-screen').style.display!=='none'){
    cx.fillStyle='#06060f';cx.fillRect(0,0,W,H);
  }
  if(!G||!G.running)requestAnimationFrame(idleLoop);
})();

updateUI();
</script>
